<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Atril — Biblioteca AJE</title>
<style>
  :root{
    /* Identidad AJE */
    --aje-green:#2E9A41;        /* verde corporativo medio */
    --aje-green-dark:#1E7A34;   /* verde oscuro */
    --aje-green-deep:#155C27;   /* verde profundo para fondos */
    --aje-green-light:#5CB85C;  /* verde claro acento */
    --aje-mint:#E8F3E9;         /* verde muy pálido / casi blanco */
    --white:#ffffff;
    --ink:#163A1F;              /* texto verde-tinta */
    --paper:#ffffff;
    --paper-edge:#e4eee6;
    --shadow:rgba(21,92,39,.22);
    --line:rgba(46,154,65,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;height:100dvh}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(140% 100% at 50% -10%, #f4faf5 0%, #e8f3e9 50%, #d8ebdb 100%);
    color:var(--ink);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    overflow:hidden;-webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }

  /* ---------- Header ---------- */
  header{width:100%;display:flex;align-items:center;gap:16px;padding:16px 26px;z-index:50;
    background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,0));
    backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:13px}
  .brand img{height:38px;width:auto;display:block}
  .brand .txt{display:flex;flex-direction:column;line-height:1.05}
  .brand .name{font-size:16px;font-weight:700;letter-spacing:.02em;color:var(--aje-green-dark)}
  .brand .sub{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--aje-green-light);font-weight:600}
  .spacer{flex:1}
  .bar-btn{appearance:none;border:1.5px solid var(--aje-green);background:var(--white);color:var(--aje-green-dark);
    font:inherit;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    padding:10px 18px;border-radius:8px;cursor:pointer;transition:.18s;box-shadow:0 2px 6px rgba(46,154,65,.12)}
  .bar-btn:hover{background:var(--aje-green);color:#fff;box-shadow:0 4px 14px rgba(46,154,65,.3)}
  .bar-btn.solid{background:var(--aje-green);color:#fff;border-color:var(--aje-green)}
  .bar-btn.solid:hover{background:var(--aje-green-dark);border-color:var(--aje-green-dark)}

  .stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:0 16px 24px}

  /* ---------- Intake / Biblioteca ---------- */
  .intake{width:min(760px,92vw);text-align:center}
  .hero-logo{height:90px;margin:0 auto 20px;display:block;filter:drop-shadow(0 6px 14px rgba(21,92,39,.18))}
  .welcome h1{font-size:26px;font-weight:700;color:var(--aje-green-dark);margin-bottom:10px;letter-spacing:-.01em}
  .welcome p{font-size:14px;color:#4a6b52;line-height:1.6;max-width:48ch;margin:0 auto}

  .shelf{margin-top:38px;text-align:left}
  .shelf h2{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--aje-green);margin-bottom:18px;padding-left:2px;font-weight:700;
    display:flex;align-items:center;gap:10px}
  .shelf h2::after{content:"";flex:1;height:1px;background:var(--line)}
  .books{display:flex;flex-wrap:wrap;gap:18px;justify-content:flex-start}
  .book-spine{position:relative;width:118px;height:162px;border-radius:4px 9px 9px 4px;
    background:linear-gradient(100deg,var(--aje-green-deep),var(--aje-green-dark) 16%,var(--aje-green) 62%,var(--aje-green-dark));
    box-shadow:inset 7px 0 12px rgba(0,0,0,.22), 0 8px 18px rgba(21,92,39,.28);
    cursor:pointer;overflow:hidden;transition:transform .18s, box-shadow .18s;
    display:flex;flex-direction:column;justify-content:flex-end;padding:13px 12px 15px 19px}
  .book-spine:hover{transform:translateY(-6px) rotate(-1deg);box-shadow:inset 7px 0 12px rgba(0,0,0,.22),0 16px 30px rgba(21,92,39,.4)}
  .book-spine::before{content:"";position:absolute;inset:7px 7px 7px 13px;border:1px solid rgba(255,255,255,.22);border-radius:3px;pointer-events:none}
  .book-spine .ttl{font-size:12px;line-height:1.3;color:#fff;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;text-shadow:0 1px 2px rgba(0,0,0,.25)}
  .book-spine .meta{font-size:9.5px;color:rgba(255,255,255,.78);margin-top:6px;line-height:1.3;letter-spacing:.02em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .book-spine .badge{position:absolute;top:9px;right:10px;font-size:10px;color:#bff5c4;text-shadow:0 0 6px rgba(120,255,140,.7)}

  /* ---------- Reader ---------- */
  .reader{display:none;flex:1;width:100%;flex-direction:column;align-items:center;justify-content:center;position:relative}
  .reader.on{display:flex}
  .bookwrap{position:relative;display:flex;align-items:center;justify-content:center;perspective:2000px;perspective-origin:50% 50%}
  .bookwrap.zooming{transition:none}
  .bookwrap.zoom-reset{transition:transform .28s cubic-bezier(.2,.7,.3,1)}
  /* al hacer zoom, desactivar zonas de tap laterales para no pasar página sin querer */
  .bookwrap.is-zoomed .turn{pointer-events:none}
  .sheet{position:relative;background:var(--paper);border-radius:2px 8px 8px 2px;
    box-shadow:0 1px 0 var(--paper-edge),0 26px 54px var(--shadow),inset 0 0 70px rgba(46,154,65,.04);overflow:hidden}
  .sheet canvas{display:block}
  .sheet .gutter{position:absolute;top:0;left:0;height:100%;width:44px;background:linear-gradient(90deg, rgba(21,92,39,.14), rgba(21,92,39,0));pointer-events:none;z-index:3}
  .sheet .vignette{position:absolute;inset:0;pointer-events:none;z-index:2;box-shadow:inset 0 0 100px rgba(46,154,65,.05);background:radial-gradient(120% 130% at 100% 50%, rgba(46,154,65,.04), transparent 55%)}
  .flip{position:absolute;top:0;z-index:20;transform-style:preserve-3d;pointer-events:none;will-change:transform}
  .flip .face{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--paper)}
  .flip .face canvas{position:absolute;top:0;display:block}
  .flip .front{z-index:2}
  .flip .back{z-index:1}
  .flip .shade{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(21,70,33,0),rgba(21,70,33,.22));opacity:0}
  .turn{position:absolute;top:0;height:100%;width:24%;z-index:12;cursor:pointer;background:transparent}
  .turn.prev{left:0}.turn.next{right:0}
  .turn .hint{position:absolute;top:50%;transform:translateY(-50%);font-size:32px;color:rgba(46,154,65,0);transition:.18s;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .turn.prev .hint{left:12px}.turn.next .hint{right:12px}
  .turn:hover .hint{color:var(--aje-green-dark);background:rgba(255,255,255,.85);box-shadow:0 3px 12px rgba(21,92,39,.22)}

  /* ---------- Controls ---------- */
  .controls{display:flex;align-items:center;gap:16px;padding:18px;z-index:40}
  .controls.hidden{display:none}
  .pager{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--line);border-radius:30px;padding:9px 20px;box-shadow:0 6px 20px rgba(21,92,39,.12)}
  .nav-arrow{appearance:none;border:none;background:none;color:var(--aje-green);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;transition:.15s}
  .nav-arrow:hover{color:var(--aje-green-dark);transform:scale(1.18)}
  .nav-arrow:disabled{opacity:.25;cursor:not-allowed;transform:none}
  .counter{font-size:13px;letter-spacing:.04em;color:var(--ink);min-width:96px;text-align:center;font-weight:600}
  .counter input{width:48px;background:var(--aje-mint);border:1px solid var(--line);color:var(--aje-green-dark);font:inherit;font-size:13px;font-weight:600;text-align:center;border-radius:6px;padding:3px}
  .slider{accent-color:var(--aje-green);width:160px;cursor:pointer}
  .icon-btn{appearance:none;width:42px;height:42px;border:1px solid var(--line);background:var(--white);color:var(--aje-green);border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 4px 12px rgba(21,92,39,.1)}
  .icon-btn:hover{border-color:var(--aje-green);color:#fff;background:var(--aje-green)}

  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:60;background:rgba(232,243,233,.7);backdrop-filter:blur(3px)}
  .loading.hidden{display:none}
  .ring{width:44px;height:44px;border:3px solid rgba(46,154,65,.22);border-top-color:var(--aje-green);border-radius:50%;animation:spin 1s linear infinite}
  .loading p{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--aje-green-dark);font-weight:600}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--aje-green-dark);border:1px solid var(--aje-green);color:#fff;padding:13px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;transition:.3s;opacity:0;box-shadow:0 10px 30px rgba(21,92,39,.3)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  input[type=file]{display:none}

  /* ---------- Overlay: tap para pantalla completa (deep link) ---------- */
  .fs-prompt{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
    background:rgba(21,60,33,.55);backdrop-filter:blur(4px)}
  .fs-prompt.on{display:flex}
  .fs-card{background:var(--white);border-radius:18px;padding:30px 28px;text-align:center;max-width:300px;
    box-shadow:0 20px 60px rgba(21,92,39,.4);animation:pop .25s ease}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .fs-card .play{width:62px;height:62px;border-radius:50%;background:var(--aje-green);margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(46,154,65,.4)}
  .fs-card .play svg{margin-left:3px}
  .fs-card h3{font-size:18px;color:var(--aje-green-dark);margin-bottom:6px;font-weight:700}
  .fs-card p{font-size:13px;color:#4a6b52;line-height:1.5;margin-bottom:18px}
  .fs-card .go{appearance:none;border:none;background:var(--aje-green);color:#fff;font:inherit;font-weight:600;
    font-size:14px;padding:12px 28px;border-radius:10px;cursor:pointer;width:100%;transition:.15s}
  .fs-card .go:active{background:var(--aje-green-dark);transform:scale(.97)}
  .fs-card .skip{margin-top:10px;background:none;border:none;color:#7a9a82;font:inherit;font-size:13px;cursor:pointer;padding:6px}

  /* ---------- Modo inmersivo (funciona en iOS sin Fullscreen API) ---------- */
  body.immersive{background:#0d1f12}
  body.immersive header{transform:translateY(-100%);pointer-events:none}
  body.immersive .controls{opacity:0;pointer-events:none;transform:translateY(20px)}
  body.immersive.show-ui .controls{opacity:1;pointer-events:auto;transform:none}
  body.immersive .stage{padding:0}
  body.immersive .sheet{box-shadow:0 0 0 1px rgba(255,255,255,.06),0 30px 70px rgba(0,0,0,.6)}
  header{transition:transform .3s ease}
  .controls{transition:opacity .25s ease, transform .25s ease}
  /* botón salir del modo inmersivo, visible al mostrar UI */
  .exit-immersive{position:fixed;top:14px;right:14px;z-index:45;width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.92);border:none;color:var(--aje-green-dark);font-size:20px;cursor:pointer;
    display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  body.immersive.show-ui .exit-immersive{display:flex}

  /* ---------- Botones flotantes laterales (móvil + inmersivo) ---------- */
  .edge-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:44;
    width:46px;height:46px;border-radius:50%;border:none;
    background:rgba(255,255,255,.22);color:var(--aje-green-dark);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;font-size:24px;line-height:1;
    box-shadow:0 2px 12px rgba(0,0,0,.3);
    opacity:0;transition:opacity .5s ease;pointer-events:none}
  .edge-nav.prev{left:12px}
  .edge-nav.next{right:12px}
  .edge-nav svg{width:22px;height:22px}
  /* visibles y tocables solo en móvil + inmersivo, con opacidad base sutil */
  body.immersive .edge-nav{display:flex;opacity:.4;pointer-events:auto}
  /* parpadeo inicial al entrar (refuerzo); termina en la opacidad base, no en 0 */
  body.immersive .edge-nav.hint-blink{animation:edgeBlink 1.1s ease 2 forwards}
  @keyframes edgeBlink{0%{opacity:.15}50%{opacity:.95}100%{opacity:.4}}
  /* al mostrar la UI (tap/inactividad) se ven más marcados */
  body.immersive.show-ui .edge-nav{opacity:.78}
  .edge-nav:active{background:rgba(46,154,65,.6);opacity:1}

  /* ---------- Móvil ---------- */
  @media (max-width:760px){
    .brand .sub{display:none}
    .brand .name{font-size:15px}
    .brand img{height:32px}
    header{padding:12px 16px}
    .turn .hint{display:none}
    .turn{width:30%}
    .stage{padding:0 8px 12px}
    .controls{gap:10px;padding:12px 10px;width:100%;justify-content:center}
    .pager{gap:10px;padding:8px 14px}
    .nav-arrow{font-size:24px;padding:6px 10px}    /* targets táctiles más grandes */
    .counter{font-size:13px;min-width:auto}
    .counter input{width:42px}
    .slider{display:none}
    .icon-btn{width:46px;height:46px;font-size:19px}
    /* galería: más aire y tarjetas que llenan el ancho */
    .intake{width:100%}
    .hero-logo{height:72px}
    .welcome h1{font-size:21px}
    .welcome p{font-size:13px;padding:0 14px}
    .books{gap:14px;justify-content:center}
    .book-spine{width:calc(50% - 7px);max-width:150px;height:150px}
    .shelf h2{justify-content:flex-start}
  }
  /* en escritorio nunca se muestran los botones flotantes */
  @media (min-width:761px){ .edge-nav{display:none!important} }
  @media (max-width:380px){
    .book-spine{width:100%;max-width:none;height:138px;flex-direction:row;align-items:center;padding:14px 18px}
    .book-spine::before{inset:8px}
    .book-spine .ttl{-webkit-line-clamp:2}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img id="logoHeader" alt="AJE">
    <div class="txt"><span class="name">Biblioteca AJE</span><span class="sub">Lector de documentos</span></div>
  </div>
  <div class="spacer"></div>
</header>
<div class="stage">
  <section class="intake" id="intake">
    <img class="hero-logo" id="logoHero" alt="AJE">
    <div class="welcome">
      <h1>Biblioteca de documentos</h1>
      <p>Selecciona un documento para leerlo como un libro. El que abras queda guardado para que la próxima vez cargue al instante.</p>
    </div>
    <div class="shelf" id="shelf" style="display:none">
      <h2>Documentos</h2>
      <div class="books" id="books"></div>
    </div>
  </section>
  <section class="reader" id="reader">
    <div class="bookwrap" id="bookwrap">
      <div class="sheet" id="sheet">
        <canvas id="pageCanvas"></canvas>
        <div class="gutter"></div><div class="vignette"></div>
        <div class="turn prev" id="turnPrev"><span class="hint">‹</span></div>
        <div class="turn next" id="turnNext"><span class="hint">›</span></div>
      </div>
    </div>
    <div class="loading hidden" id="loading"><div class="ring"></div><p id="loadingTxt">Cargando</p></div>
  </section>
</div>
<div class="controls hidden" id="controls">
  <div class="pager">
    <button class="nav-arrow" id="first">«</button>
    <button class="nav-arrow" id="prev">‹</button>
    <span class="counter"><input type="number" id="pageInput" min="1" value="1"> / <span id="pageTotal">1</span></span>
    <button class="nav-arrow" id="next">›</button>
    <button class="nav-arrow" id="last">»</button>
  </div>
  <input type="range" class="slider" id="slider" min="1" value="1">
  <button class="icon-btn" id="btnFs" title="Pantalla completa">⤢</button>
</div>
<button class="exit-immersive" id="exitImmersive" title="Salir">✕</button>
<button class="edge-nav prev" id="edgePrev" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
<button class="edge-nav next" id="edgeNext" aria-label="Siguiente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
<div class="toast" id="toast"></div>

<!-- Overlay: un tap para entrar a pantalla completa (deep link) -->
<div class="fs-prompt" id="fsPrompt">
  <div class="fs-card">
    <div class="play"><svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></div>
    <h3>Modo lectura</h3>
    <p>Abre el documento a pantalla completa para una mejor experiencia.</p>
    <button class="go" id="fsGo">Abrir a pantalla completa</button>
    <button class="skip" id="fsSkip">Leer así</button>
  </div>
</div>

<script src="assets/logo-aje.js"></script>
<script type="module">

/* pdf.js se carga dinámicamente. Si el CDN falla, la galería igual funciona
   y se avisa al intentar abrir un documento. */
const PDFJS_CDN='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
const PDFJS_WORKER='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
let pdfjsLib=null, pdfjsReady=(async()=>{
  try{
    pdfjsLib=await import(PDFJS_CDN);
    pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER;
    return true;
  }catch(e){ console.error('No se pudo cargar pdf.js:',e); return false; }
})();

/* Logo AJE: viene de assets/logo-aje.js (window.AJE_LOGO) */
if(window.AJE_LOGO){
  document.getElementById('logoHeader').src=window.AJE_LOGO;
  document.getElementById('logoHero').src=window.AJE_LOGO;
}


/* ===== IndexedDB ===== */
const DB='atril-db',STORE='books';
const openDB=()=>new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);});
const dbPut=async b=>{const d=await openDB();return new Promise((res,rej)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).put(b);t.oncomplete=res;t.onerror=e=>rej(e.target.error);});};
const dbAll=async()=>{const d=await openDB();return new Promise((res,rej)=>{const q=d.transaction(STORE,'readonly').objectStore(STORE).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=e=>rej(e.target.error);});};
const dbGet=async id=>{const d=await openDB();return new Promise((res,rej)=>{const q=d.transaction(STORE,'readonly').objectStore(STORE).get(id);q.onsuccess=()=>res(q.result);q.onerror=e=>rej(e.target.error);});};
const dbDel=async id=>{const d=await openDB();return new Promise((res,rej)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=res;t.onerror=e=>rej(e.target.error);});};

const $=s=>document.querySelector(s);
let pdfDoc=null,current=1,total=1,animating=false,renderToken=0;
// ---- estado de zoom (pinch) ----
let zoom=1, panX=0, panY=0;
const MIN_ZOOM=1, MAX_ZOOM=4;
function applyZoom(animate){
  bookwrap.classList.toggle('zoom-reset', !!animate);
  bookwrap.classList.toggle('zooming', !animate);
  bookwrap.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  bookwrap.classList.toggle('is-zoomed', zoom>1.02);
}
function resetZoom(animate){ zoom=1;panX=0;panY=0;applyZoom(animate); }
function clampPan(){
  const rect=sheet.getBoundingClientRect();
  const maxX=(rect.width*(zoom-1))/2/zoom + 40;
  const maxY=(rect.height*(zoom-1))/2/zoom + 40;
  panX=Math.max(-maxX,Math.min(maxX,panX));
  panY=Math.max(-maxY,Math.min(maxY,panY));
}
const cache=new Map(),dimCache=new Map(),MAX_CACHE=10;
const intake=$('#intake'),reader=$('#reader'),controls=$('#controls');
const sheet=$('#sheet'),pageCanvas=$('#pageCanvas'),bookwrap=$('#bookwrap');
const loading=$('#loading'),loadingTxt=$('#loadingTxt');
const pageInput=$('#pageInput'),pageTotal=$('#pageTotal'),slider=$('#slider');
let toastT;const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);};

function isFs(){return document.fullscreenElement||document.webkitFullscreenElement;}
function isImmersive(){return document.body.classList.contains('immersive');}
function fitSize(pw,ph){
  const big=isFs()||isImmersive();
  const isMobile=window.innerWidth<=760;
  const vw=window.innerWidth, vh=window.innerHeight;
  // márgenes reservados: menos en móvil y en modo grande
  const marginW = big ? (isMobile?12:60) : (isMobile?16:40);
  const marginH = big ? (isMobile?20:90) : (isMobile?120:190);
  const availW=Math.min(vw-marginW, big?1600:1100);
  const availH=vh-marginH;
  let w=availW,h=w*(ph/pw);
  if(h>availH){h=availH;w=h*(pw/ph);}
  return {w:Math.round(w),h:Math.round(h)};
}
async function pageDims(num){
  if(dimCache.has(num))return dimCache.get(num);
  const vp=(await pdfDoc.getPage(num)).getViewport({scale:1});
  const d={pw:vp.width,ph:vp.height};dimCache.set(num,d);return d;
}
async function renderPageToCanvas(num,tw,th){
  const page=await pdfDoc.getPage(num);
  const base=page.getViewport({scale:1});
  const dpr=Math.min(window.devicePixelRatio||1,2.5);
  const vp=page.getViewport({scale:(tw/base.width)*dpr});
  const c=document.createElement('canvas');
  c.width=Math.round(vp.width);c.height=Math.round(vp.height);
  c.style.width=tw+'px';c.style.height=th+'px';
  const ctx=c.getContext('2d',{alpha:false});
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,c.width,c.height);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  return c;
}
async function getCanvas(num,w,h){
  const hit=cache.get(num);
  if(hit&&hit.w===w&&hit.h===h)return hit.canvas;
  const c=await renderPageToCanvas(num,w,h);
  cache.set(num,{canvas:c,w,h});
  if(cache.size>MAX_CACHE){const k=cache.keys().next().value;if(k!==num)cache.delete(k);}
  return c;
}
function paintSheet(canvas,w,h){
  sheet.style.width=w+'px';sheet.style.height=h+'px';
  const ctx=pageCanvas.getContext('2d');
  pageCanvas.width=canvas.width;pageCanvas.height=canvas.height;
  pageCanvas.style.width=w+'px';pageCanvas.style.height=h+'px';
  ctx.drawImage(canvas,0,0);
}
async function showPage(num){
  const token=++renderToken;
  resetZoom(false);
  const {pw,ph}=await pageDims(num);const {w,h}=fitSize(pw,ph);
  const canvas=await getCanvas(num,w,h);
  if(token!==renderToken)return;
  paintSheet(canvas,w,h);
  current=num;syncControls();prefetch(num);
}
async function prefetch(num){
  for(const n of [num+1,num-1,num+2]){
    if(n<1||n>total)continue;
    try{const {pw,ph}=await pageDims(n);const {w,h}=fitSize(pw,ph);await getCanvas(n,w,h);}catch(e){}
  }
}

/* ============================================================
   PASAR HOJA — hoja RÍGIDA tipo libro real.
   La hoja ocupa MEDIA página y rota sobre el LOMO (centro del libro).
   - next: la mitad derecha de la pág. ACTUAL se levanta y gira hasta
     posarse sobre la mitad izquierda. Eje = borde izquierdo de la hoja
     (el lomo). transform: rotateY(0 -> -180).
   - Doble cara: front=mitad de la actual, back=mitad de la destino.
   - El sheet de abajo NO cambia hasta que la hoja cruza 90°, así no se
     ve la página nueva antes de tiempo.
   ============================================================ */
async function turnPage(dir){
  if(animating)return;
  const target=current+dir;
  if(target<1||target>total)return;
  if(zoom>1.02) resetZoom(true);   // si estaba con zoom, volver a 1x antes de pasar
  animating=true;

  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const cur=await pageDims(current),tgt=await pageDims(target);
  const cf=fitSize(cur.pw,cur.ph),tf=fitSize(tgt.pw,tgt.ph);
  const curCanvas=await getCanvas(current,cf.w,cf.h);
  const tgtCanvas=await getCanvas(target,tf.w,tf.h);

  if(reduce){paintSheet(tgtCanvas,tf.w,tf.h);current=target;syncControls();prefetch(target);animating=false;return;}

  // mantener la página ACTUAL abajo (todavía no la destino)
  paintSheet(curCanvas,cf.w,cf.h);

  const W=cf.w,H=cf.h,halfW=W/2;
  const fScaleX=curCanvas.width/W, fScaleY=curCanvas.height/H;
  const bScaleX=tgtCanvas.width/tf.w, bScaleY=tgtCanvas.height/tf.h;

  const fImg=new Image(),bImg=new Image();
  await Promise.all([
    new Promise(r=>{fImg.onload=r;fImg.src=curCanvas.toDataURL();}),
    new Promise(r=>{bImg.onload=r;bImg.src=tgtCanvas.toDataURL();})
  ]);

  // hoja: media página de ancho
  const flip=document.createElement('div');
  flip.className='flip';
  flip.style.width=halfW+'px';flip.style.height=H+'px';
  // posición y eje según dirección
  if(dir>0){
    // mitad derecha; el eje (lomo) es el borde IZQUIERDO de la hoja => centro del libro
    flip.style.left=halfW+'px';            // arranca en la mitad derecha
    flip.style.transformOrigin='left center';
  }else{
    // mitad izquierda; el eje (lomo) es el borde DERECHO de la hoja
    flip.style.left='0px';
    flip.style.transformOrigin='right center';
  }

  // caras
  const front=document.createElement('div');front.className='face front';
  const fc=document.createElement('canvas');
  fc.style.width=W+'px';fc.style.height=H+'px';        // canvas full, lo desplazamos
  fc.width=curCanvas.width;fc.height=curCanvas.height;
  fc.getContext('2d').drawImage(fImg,0,0);
  // recorte: front muestra la mitad correspondiente
  fc.style.position='absolute';fc.style.top='0';
  fc.style.left=(dir>0?(-halfW):0)+'px';                // next:mitad der ; prev:mitad izq
  front.appendChild(fc);

  const back=document.createElement('div');back.className='face back';
  const bc=document.createElement('canvas');
  bc.style.width=W+'px';bc.style.height=H+'px';
  bc.width=tgtCanvas.width;bc.height=tgtCanvas.height;
  bc.getContext('2d').drawImage(bImg,0,0);
  bc.style.position='absolute';bc.style.top='0';
  // back está rotada 180 en Y => para que se lea bien, mostramos la mitad opuesta
  // next: al voltear se ve la mitad IZQUIERDA del destino
  // prev: al voltear se ve la mitad DERECHA del destino
  bc.style.left=(dir>0?0:(-halfW))+'px';
  back.style.transform='rotateY(180deg)';
  back.appendChild(bc);

  const shade=document.createElement('div');shade.className='shade';

  flip.appendChild(back);flip.appendChild(front);flip.appendChild(shade);
  bookwrap.appendChild(flip);

  // animación manual con rAF para controlar el revelado del sheet a 90°
  const dur=720;
  const ease=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2; // easeInOutQuad
  const t0=performance.now();
  let revealed=false;

  await new Promise(resolve=>{
    (function frame(now){
      const k=Math.min(1,(now-t0)/dur);
      const e=ease(k);
      // ángulo 0 -> 180 (next gira a -, prev gira a +)
      const deg=180*e;
      const sign=dir>0?-1:1;
      flip.style.transform=`rotateY(${sign*deg}deg)`;
      // sombra: máxima en el ecuador (90°), se desvanece a los extremos
      const sh=Math.sin(e*Math.PI);
      shade.style.opacity=(sh*0.7).toFixed(3);
      // al cruzar 90°, revelar la página DESTINO en el sheet de abajo
      if(!revealed && e>=0.5){
        revealed=true;
        paintSheet(tgtCanvas,tf.w,tf.h);
      }
      if(k<1)requestAnimationFrame(frame);
      else resolve();
    })(performance.now());
  });

  // asegurar estado final
  if(!revealed)paintSheet(tgtCanvas,tf.w,tf.h);
  flip.remove();
  current=target;syncControls();prefetch(target);
  animating=false;
}

async function goTo(num){
  num=Math.max(1,Math.min(total,num));
  if(num===current||animating){syncControls();return;}
  if(Math.abs(num-current)===1)turnPage(num>current?1:-1);
  else{cache.clear();await showPage(num);}
}
function syncControls(){
  pageInput.value=current;pageInput.max=total;pageTotal.textContent=total;
  slider.value=current;slider.max=total;
  $('#first').disabled=current<=1;$('#prev').disabled=current<=1;
  $('#last').disabled=current>=total;$('#next').disabled=current>=total;
}
/* ===== Catálogo del repo: libros/index.json ===== */
const INDEX_URL='libros/index.json';
const LIBROS_DIR='libros/';
let catalogo=[];

async function loadPDF(data){
  loading.classList.remove('hidden');loadingTxt.textContent='Abriendo';
  // asegurar que pdf.js esté cargado
  const ok=await pdfjsReady;
  if(!ok || !pdfjsLib){
    loading.classList.add('hidden');
    toast('No se pudo cargar el visor de PDF. Revisa tu conexión e inténtalo de nuevo.');
    return;
  }
  cache.clear();dimCache.clear();renderToken++;
  try{
    pdfDoc=await pdfjsLib.getDocument({data:data.slice(0)}).promise;
    total=pdfDoc.numPages;current=1;
    intake.style.display='none';reader.classList.add('on');controls.classList.remove('hidden');
    await showPage(1);
  }catch(e){console.error(e);toast('No se pudo abrir el PDF');backToLibrary();}
  finally{loading.classList.add('hidden');}
}

/* Abre un libro: primero busca en caché (IndexedDB); si no está, lo descarga
   del repo y lo guarda en caché para futuras aperturas instantáneas. */
async function openBook(item, fromURL){
  const id='repo_'+item.archivo;
  // actualizar la URL para que sea copiable/compartible (sin recargar)
  if(!fromURL){
    try{
      const u=new URL(location.href);
      u.searchParams.set('libro', item.archivo);
      u.hash='';
      history.replaceState(null,'',u);
    }catch(e){}
  }
  // 1) intentar caché
  let cached=null;
  try{ cached=await dbGet(id); }catch(e){}
  if(cached && cached.data){
    await loadPDF(cached.data);
    return;
  }
  // 2) descargar del repo
  loading.classList.remove('hidden');loadingTxt.textContent='Descargando';
  try{
    const url=LIBROS_DIR+encodeURIComponent(item.archivo);
    const resp=await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const buf=await resp.arrayBuffer();
    // guardar en caché
    try{
      await dbPut({id, archivo:item.archivo, name:item.titulo||item.archivo,
                   size:buf.byteLength, added:Date.now(), data:buf});
    }catch(e){ console.warn('No se pudo cachear:',e); }
    await loadPDF(buf);
  }catch(e){
    console.error(e);
    loading.classList.add('hidden');
    toast('No se pudo cargar "'+(item.titulo||item.archivo)+'"');
  }
}

/* Carga el catálogo y pinta la galería */
async function loadCatalog(){
  const books=$('#books'),shelf=$('#shelf');
  try{
    const resp=await fetch(INDEX_URL,{cache:'no-cache'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    catalogo=Array.isArray(data)?data:(data.libros||[]);
  }catch(e){
    console.error('No se pudo leer index.json:',e);
    shelf.style.display='block';
    books.innerHTML='<p style="color:#4a6b52;font-size:14px;max-width:48ch">No se pudo cargar el catálogo. Verifica que exista el archivo <code>libros/index.json</code> y que estés viendo la página desde un servidor (GitHub Pages o similar), no abriendo el HTML directamente.</p>';
    return;
  }
  await renderGallery();
  // Deep link: abrir directamente el libro indicado en la URL (?libro= o #nombre)
  await openFromURL();
}

/* Resuelve el PDF pedido por la URL.
   Soporta:  ?libro=Archivo.pdf   (query string, con o sin .pdf)
             #Archivo            (hash, con o sin .pdf)
   Busca coincidencia en el catálogo por nombre de archivo (flexible). */
function findInCatalog(ref){
  if(!ref) return null;
  let r=decodeURIComponent(ref).trim();
  const norm=s=>s.toLowerCase().replace(/\.pdf$/,'').replace(/[\s_-]+/g,'');
  const target=norm(r);
  // 1) match exacto por archivo
  let hit=catalogo.find(it=>it.archivo && norm(it.archivo)===target);
  if(hit) return hit;
  // 2) match por título
  hit=catalogo.find(it=>it.titulo && norm(it.titulo)===target);
  if(hit) return hit;
  // 3) match parcial (empieza con)
  hit=catalogo.find(it=>it.archivo && norm(it.archivo).startsWith(target));
  return hit||null;
}

async function openFromURL(){
  const params=new URLSearchParams(location.search);
  let ref=params.get('libro');
  if(!ref && location.hash) ref=location.hash.replace(/^#/,'');
  if(!ref) return;
  const item=findInCatalog(ref);
  if(item){
    await openBook(item, true);
    // si el lector quedó abierto, ofrecer pantalla completa con un tap
    if(reader.classList.contains('on')) showFsPrompt();
  }
  else{ toast('No se encontró "'+ref+'" en el catálogo'); }
}

async function renderGallery(){
  const books=$('#books'),shelf=$('#shelf');
  shelf.style.display='block';books.innerHTML='';
  if(!catalogo.length){
    books.innerHTML='<p style="color:#4a6b52;font-size:14px">El catálogo está vacío. Agrega libros en <code>libros/index.json</code>.</p>';
    return;
  }
  // saber cuáles están en caché para marcarlos
  let cachedIds=new Set();
  try{ (await dbAll()).forEach(b=>cachedIds.add(b.id)); }catch(e){}
  for(const item of catalogo){
    const id='repo_'+item.archivo;
    const isCached=cachedIds.has(id);
    const el=document.createElement('div');el.className='book-spine';el.title=item.titulo||item.archivo;
    el.innerHTML=`${isCached?'<span class="badge" title="Disponible sin conexión">●</span>':''}<div class="ttl">${esc(item.titulo||item.archivo)}</div>${item.descripcion?`<div class="meta">${esc(item.descripcion)}</div>`:''}`;
    el.addEventListener('click',()=>openBook(item));
    books.appendChild(el);
  }
}

function backToLibrary(){
  // salir de inmersivo/fullscreen si estaba activo
  if(isImmersive()||isFs()) exitImmersive();
  hideFsPrompt();
  reader.classList.remove('on');controls.classList.add('hidden');
  intake.style.display='block';
  pdfDoc=null;cache.clear();
  // limpiar la URL al volver a la biblioteca
  try{ const u=new URL(location.href); u.searchParams.delete('libro'); u.hash=''; history.replaceState(null,'',u); }catch(e){}
  renderGallery();
}
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtSize=b=>b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB';

/* ===== Pantalla completa / Modo inmersivo =====
   - Escritorio y Android: Fullscreen API real + modo inmersivo CSS.
   - iOS Safari: no hay Fullscreen API para divs => solo modo inmersivo CSS,
     que igual oculta header y maximiza el lector. */
const FS_SUPPORTED = !!(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen);

function enterImmersive(){
  document.body.classList.add('immersive');
  // intentar fullscreen real si está soportado (debe venir de un gesto)
  if(FS_SUPPORTED && !isFs()){
    const el=document.documentElement;
    try{(el.requestFullscreen||el.webkitRequestFullscreen).call(el);}catch(e){}
  }
  refreshFsBtn();
  if(pdfDoc){cache.clear();showPage(current);}
  // parpadeo inicial de los botones laterales (solo móvil; CSS ya los oculta en desktop)
  blinkEdgeNav();
  // ocultar la UI tras un momento para inmersión total
  scheduleHideUI();
}
function blinkEdgeNav(){
  ['edgePrev','edgeNext'].forEach(id=>{
    const el=$('#'+id);
    el.classList.remove('hint-blink');
    void el.offsetWidth;          // reiniciar animación
    el.classList.add('hint-blink');
  });
}
function exitImmersive(){
  document.body.classList.remove('immersive','show-ui');
  if(FS_SUPPORTED && isFs()){
    try{(document.exitFullscreen||document.webkitExitFullscreen).call(document);}catch(e){}
  }
  refreshFsBtn();
  if(pdfDoc){cache.clear();showPage(current);}
}
function toggleImmersive(){
  if(isImmersive()) exitImmersive(); else enterImmersive();
}
function refreshFsBtn(){
  const on=isImmersive()||isFs();
  $('#btnFs').textContent=on?'⤡':'⤢';
  $('#btnFs').title=on?'Salir de pantalla completa':'Pantalla completa';
}
// auto-ocultar controles en modo inmersivo; reaparecen al tocar
let hideTimer;
function scheduleHideUI(){
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{ if(isImmersive()) document.body.classList.remove('show-ui'); },2600);
}
function showUI(){
  if(!isImmersive()) return;
  document.body.classList.add('show-ui');
  scheduleHideUI();
}
function onFsChange(){
  // si el usuario sale del fullscreen del navegador (tecla ESC), sincronizar
  if(!isFs() && isImmersive() && FS_SUPPORTED){
    document.body.classList.remove('immersive','show-ui');
    if(pdfDoc){cache.clear();showPage(current);}
  }
  refreshFsBtn();
}

/* ---- Manejo táctil: pinch-zoom + pan + swipe + doble-tap ---- */
let pinchStartDist=0, pinchStartZoom=1;
let panStartX=0, panStartY=0, panOrigX=0, panOrigY=0;
let tStartX=0,tStartY=0,tStartT=0,tMoved=false;
let lastTapT=0;
let gesture=null;  // 'pinch' | 'pan' | 'swipe' | null

function dist(t1,t2){const dx=t1.clientX-t2.clientX,dy=t1.clientY-t2.clientY;return Math.hypot(dx,dy);}

bookwrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    // inicio de pinch
    gesture='pinch';
    pinchStartDist=dist(e.touches[0],e.touches[1]);
    pinchStartZoom=zoom;
    bookwrap.classList.add('zooming');
    e.preventDefault();
  }else if(e.touches.length===1){
    const t=e.touches[0];
    tStartX=t.clientX;tStartY=t.clientY;tStartT=Date.now();tMoved=false;
    if(zoom>1.02){
      // con zoom: 1 dedo = paneo
      gesture='pan';
      panStartX=t.clientX;panStartY=t.clientY;panOrigX=panX;panOrigY=panY;
    }else{
      gesture='swipe';
    }
  }
},{passive:false});

bookwrap.addEventListener('touchmove',e=>{
  if(gesture==='pinch' && e.touches.length===2){
    e.preventDefault();
    const d=dist(e.touches[0],e.touches[1]);
    let nz=pinchStartZoom*(d/pinchStartDist);
    zoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,nz));
    clampPan();
    applyZoom(false);
  }else if(gesture==='pan' && e.touches.length===1){
    e.preventDefault();
    const t=e.touches[0];
    panX=panOrigX+(t.clientX-panStartX);
    panY=panOrigY+(t.clientY-panStartY);
    clampPan();
    applyZoom(false);
  }else if(gesture==='swipe' && e.touches.length===1){
    const t=e.touches[0];
    if(Math.abs(t.clientX-tStartX)>10||Math.abs(t.clientY-tStartY)>10)tMoved=true;
  }
},{passive:false});

bookwrap.addEventListener('touchend',e=>{
  // fin de pinch: si quedó casi en 1, resetear suave
  if(gesture==='pinch'){
    if(zoom<=1.04){ resetZoom(true); }
    else{ clampPan(); applyZoom(true); }
    gesture=e.touches.length===1?'pan':null;
    return;
  }
  if(gesture==='pan'){
    clampPan();applyZoom(true);
    gesture=null;
    return;
  }
  // gesture swipe / tap (solo sin zoom)
  if(zoom>1.02){ gesture=null; return; }
  const t=e.changedTouches[0];
  const dx=t.clientX-tStartX, dy=t.clientY-tStartY, dt=Date.now()-tStartT;
  const swipeThreshold=Math.max(50,window.innerWidth*0.12);
  // swipe horizontal claro => pasar página
  if(Math.abs(dx)>swipeThreshold && Math.abs(dx)>Math.abs(dy)*1.4){
    turnPage(dx<0?1:-1);
    gesture=null;return;
  }
  if(!tMoved && dt<300){
    // doble-tap => zoom rápido a 2.4x centrado en el toque
    const now=Date.now();
    if(now-lastTapT<300){
      const rect=sheet.getBoundingClientRect();
      const cx=t.clientX-(rect.left+rect.width/2);
      const cy=t.clientY-(rect.top+rect.height/2);
      zoom=2.4;
      panX=-cx*(zoom-1);
      panY=-cy*(zoom-1);
      clampPan();applyZoom(true);
      lastTapT=0;
      gesture=null;return;
    }
    lastTapT=now;
    // tap simple => alternar UI en inmersivo
    if(isImmersive()){
      if(document.body.classList.contains('show-ui')) document.body.classList.remove('show-ui');
      else showUI();
    }
  }
  gesture=null;
},{passive:false});
